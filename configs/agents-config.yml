# ==============================================================
# MGSPlus — Agents Configuration
# CrewAI multi-agent service ports, LLM, memory, MCP.
# Secrets (OPENAI_API_KEY, etc.) live in root .env.
# ==============================================================

# ── Agent service ports & Docker hostnames ─────────────────────
services:
  supervisor:
    host: agents-supervisor
    port: 8010
  documents:
    host: agents-documents
    port: 8011
  workflow:
    host: agents-workflow
    port: 8012

# ── LLM ───────────────────────────────────────────────────────
llm:
  provider: ollama          # openai | ollama | vllm | any openai-compatible
  model: llama3.1:latest
  base_url: http://localhost:11434
  embedding_model: nomic-embed-text

# ── Conversation memory ────────────────────────────────────────
memory:
  short_term_ttl_seconds: 3600
  long_term_summary_threshold: 20

# ── MCP server base URLs (empty = disabled) ───────────────────
mcp:
  zalo_url: ""
  messenger_url: ""
  wiki_url: "http://mcp-wiki:8020"
  web_url: "http://mcp-web:8021"
