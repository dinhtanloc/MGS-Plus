# MGSPlus — Docker Compose (all services)
#
# Single env source: .env  (project root) — read automatically by Docker Compose.
# Run from project root:
#   docker compose up -d
#
# Selective start:
#   docker compose up -d sqlserver qdrant neo4j

name: ${COMPOSE_PROJECT_NAME:-mgsplus}

# ── Shared config ──────────────────────────────────────────────────────────────
x-env: &env
  env_file:
    - .env                     # ← project root .env (single source of truth)

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  mgs-net:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  sqlserver-data:
  qdrant-data:
  neo4j-data:
  neo4j-logs:
  prometheus-data:
  grafana-data:

# ── Services ───────────────────────────────────────────────────────────────────
services:

  # ── SQL Server ────────────────────────────────────────────────────────────────
  sqlserver:
    platform: linux/amd64
    build:
      context: infra/docker/services/sqlserver
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-mgsplus}-sqlserver:latest
    <<: [*env, *restart, *logging]
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql/data
    networks:
      - mgs-net
    healthcheck:
      # $$VAR → $VAR inside container shell → resolved at runtime from container env
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P \"$$SA_PASSWORD\" -C -Q 'SELECT 1' -b -o /dev/null"]
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 5

  # ── Qdrant ────────────────────────────────────────────────────────────────────
  qdrant:
    build:
      context: infra/docker/services/qdrant
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-mgsplus}-qdrant:latest
    <<: [*env, *restart, *logging]
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - mgs-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/readyz"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # ── Neo4j ─────────────────────────────────────────────────────────────────────
  neo4j:
    build:
      context: infra/docker/services/neo4j
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-mgsplus}-neo4j:latest
    <<: [*env, *restart, *logging]
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - mgs-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ── Backend (ASP.NET Core) ────────────────────────────────────────────────────
  backend:
    build:
      context: src/backend
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-mgsplus}-backend:latest
    <<: [*env, *restart, *logging]
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:${BACKEND_PORT:-5001}
      SQLSERVER_HOST: sqlserver          # use docker service name inside network
      QDRANT_HOST: qdrant
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "${BACKEND_PORT:-5001}:${BACKEND_PORT:-5001}"
    networks:
      - mgs-net
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${BACKEND_PORT:-5001}/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Supervisor Agent ──────────────────────────────────────────────────────────
  agents-supervisor:
    build:
      context: .
      dockerfile: infra/docker/services/agents/Dockerfile
      args:
        AGENT: supervisor
    image: ${COMPOSE_PROJECT_NAME:-mgsplus}-agents-supervisor:latest
    <<: [*env, *restart, *logging]
    environment:
      AGENT: supervisor
      SQLSERVER_HOST: sqlserver
      QDRANT_HOST: qdrant
      NEO4J_URI: bolt://neo4j:7687
      DOCUMENTS_PORT: ${DOCUMENTS_PORT:-8011}
      WORKFLOW_PORT: ${WORKFLOW_PORT:-8012}
    ports:
      - "${SUPERVISOR_PORT:-8010}:8010"
    networks:
      - mgs-net
    depends_on:
      - sqlserver
      - qdrant
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8010/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Documents Agent ───────────────────────────────────────────────────────────
  agents-documents:
    build:
      context: .
      dockerfile: infra/docker/services/agents/Dockerfile
      args:
        AGENT: documents
    image: ${COMPOSE_PROJECT_NAME:-mgsplus}-agents-documents:latest
    <<: [*env, *restart, *logging]
    environment:
      AGENT: documents
      SQLSERVER_HOST: sqlserver
      QDRANT_HOST: qdrant
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "${DOCUMENTS_PORT:-8011}:8011"
    networks:
      - mgs-net
    depends_on:
      - qdrant
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8011/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Workflow Agent ────────────────────────────────────────────────────────────
  agents-workflow:
    build:
      context: .
      dockerfile: infra/docker/services/agents/Dockerfile
      args:
        AGENT: workflow
    image: ${COMPOSE_PROJECT_NAME:-mgsplus}-agents-workflow:latest
    <<: [*env, *restart, *logging]
    environment:
      AGENT: workflow
      SQLSERVER_HOST: sqlserver
    ports:
      - "${WORKFLOW_PORT:-8012}:8012"
    networks:
      - mgs-net
    depends_on:
      - sqlserver
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8012/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    <<: [*restart, *logging]
    volumes:
      - ./infra/docker/services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    networks:
      - mgs-net

  # ── Grafana ────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    <<: [*restart, *logging]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - mgs-net
    depends_on:
      - prometheus

  # ── MCP Wikipedia Server ─────────────────────────────────────────────────────
  mcp-wiki:
    build:
      context: .
      dockerfile: infra/docker/services/agents/Dockerfile
      args:
        AGENT: mcp_wiki
    image: ${COMPOSE_PROJECT_NAME:-mgsplus}-mcp-wiki:latest
    <<: [*restart, *logging]
    environment:
      MCP_WIKI_PORT: 8020
      WIKI_LANG: vi
    command: ["python", "-m", "src.agents.core.mcp.wiki_server"]
    ports:
      - "${MCP_WIKI_PORT:-8020}:8020"
    networks:
      - mgs-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8020/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Frontend (Nginx) ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infra/docker/services/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:5001}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:5001}
    image: ${COMPOSE_PROJECT_NAME:-mgsplus}-frontend:latest
    <<: [*restart, *logging]
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - mgs-net
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
