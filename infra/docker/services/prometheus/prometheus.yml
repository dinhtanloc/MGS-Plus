global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:5000']
    metrics_path: /metrics

  - job_name: 'agents-supervisor'
    static_configs:
      - targets: ['agents-supervisor:8010']
    metrics_path: /metrics

  - job_name: 'agents-documents'
    static_configs:
      - targets: ['agents-documents:8011']
    metrics_path: /metrics

  - job_name: 'agents-workflow'
    static_configs:
      - targets: ['agents-workflow:8012']
    metrics_path: /metrics

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:9090']
    metrics_path: /metrics
