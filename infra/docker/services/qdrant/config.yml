log_level: info

storage:
  storage_path: ./storage
  snapshots_path: ./snapshots
  wal:
    wal_capacity_mb: 200
    wal_segments_ahead: 0

service:
  host: 0.0.0.0
  http_port: 6333
  grpc_port: 6334
  # API key is injected at runtime via QDRANT__SERVICE__API_KEY env var
  enable_cors: true

performance:
  max_concurrent_requests: 100

telemetry_disabled: false

cluster:
  enabled: false
